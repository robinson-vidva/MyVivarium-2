    get:
      summary: "Get one maintenance note"
      description: "Returns a single maintenance note. Soft-deleted notes are hidden unless the caller is admin and passes include_deleted=true."
      operationId: getMaintenanceNote
      tags: ["Maintenance Notes"]
      x-mv-read: true
      parameters:
        - name: id
          in: path
          required: true
          description: "Note identifier."
          schema:
            type: integer
          example: 42
        - $ref: "#/components/parameters/IncludeDeletedParam"
      responses:
        "200":
          description: "The note."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/MaintenanceNote"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: "Note not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      summary: "Edit a maintenance note"
      description: "Edit a maintenance note. Only the original author may edit, and only within 24 hours of creation. Destructive write."
      operationId: updateMaintenanceNote
      tags: ["Maintenance Notes"]
      x-mv-destructive: true
      parameters:
        - name: id
          in: path
          required: true
          description: "Note identifier."
          schema:
            type: integer
          example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note_text:
                  type: string
                type:
                  type: string
      responses:
        "200":
          description: "Updated note."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/MaintenanceNote"
        "400":
          description: "Bad request."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: "Not the author or past the 24h window."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: "Note not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      summary: "Soft-delete a maintenance note"
      description: "Soft-delete (set deleted_at) on a maintenance note. The original author or any admin may delete. Destructive: supports the confirm flow."
      operationId: deleteMaintenanceNote
      tags: ["Maintenance Notes"]
      x-mv-destructive: true
      parameters:
        - name: id
          in: path
          required: true
          description: "Note identifier."
          schema:
            type: integer
          example: 42
      responses:
        "200":
          description: "Soft-deleted note (id, deleted_at)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      deleted_at:
                        type: string
        "202":
          description: "Pending operation; awaiting confirmation."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/PendingOperation"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: "Not the author and not admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: "Note not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "410":
          description: "Pending operation token has expired."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
