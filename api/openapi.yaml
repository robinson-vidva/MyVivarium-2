          in: query
          required: false
          description: "Inclusive lower-bound date (YYYY-MM-DD)."
          schema:
            type: string
            example: "2026-05-01"
        - name: to
          in: query
          required: false
          description: "Inclusive upper-bound date (YYYY-MM-DD)."
          schema:
            type: string
            example: "2026-05-14"
