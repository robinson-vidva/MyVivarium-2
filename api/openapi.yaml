openapi: 3.1.0
info:
  title: "MyVivarium API"
  version: "1.0"
  description: "Versioned JSON REST API for the MyVivarium colony database. Single source of truth for both the human-facing docs at /api/docs and the AI chatbot's tool definitions. Endpoints cover mice, holding cages, breeding cages, maintenance notes, the audit log, and identity. All requests except /health require an API key."
  x-base-url: "/api/v1"
servers:
  - url: "https://{host}/api/v1"
    description: "Production deployment of MyVivarium."
    variables:
      host:
        default: "myvivarium.example.org"
        description: "The host serving MyVivarium."
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "Per-user 64-hex-char token. Issue from Admin > API Keys."
  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      description: "Max items per page. Default 50, max 200."
      schema:
        type: integer
        minimum: 1
        maximum: 200
        example: 50
    OffsetParam:
      name: offset
      in: query
      required: false
      description: "Zero-based row offset for paging."
      schema:
        type: integer
        minimum: 0
        example: 0
    IncludeDeletedParam:
      name: include_deleted
      in: query
      required: false
      description: "Admin-only flag to also return soft-deleted rows."
      schema:
        type: string
        example: "false"
  schemas:
    Mouse:
      type: object
      description: "A single mouse in the colony."
      properties:
        mouse_id:
          type: string
          example: "M042"
        sex:
          type: string
          enum: ["male", "female", "unknown"]
        dob:
          type: string
          example: "2025-08-01"
        current_cage_id:
          type: string
          nullable: true
        strain:
          type: string
          nullable: true
        genotype:
          type: string
          nullable: true
        ear_code:
          type: string
          nullable: true
        sire_id:
          type: string
          nullable: true
        dam_id:
          type: string
          nullable: true
        sire_external_ref:
          type: string
          nullable: true
        dam_external_ref:
          type: string
          nullable: true
        source_cage_label:
          type: string
          nullable: true
        status:
          type: string
          enum: ["alive", "sacrificed", "transferred_out", "archived"]
        sacrificed_at:
          type: string
          nullable: true
        sacrifice_reason:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_by:
          type: integer
          nullable: true
        created_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true
    HoldingCage:
      type: object
      description: "A holding (non-breeding) cage."
      properties:
        cage_id:
          type: string
          example: "HC-12"
        pi_name:
          type: integer
          nullable: true
        quantity:
          type: integer
          nullable: true
        remarks:
          type: string
          nullable: true
        status:
          type: string
        room:
          type: string
          nullable: true
        rack:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true
        occupants:
          type: array
          items:
            $ref: "#/components/schemas/Mouse"
        assigned_user_ids:
          type: array
          items:
            type: integer
        recent_maintenance_notes:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceNote"
    BreedingCage:
      type: object
      description: "A breeding cage with mating pairs and litters."
      properties:
        cage_id:
          type: string
          example: "BC-7"
        pi_name:
          type: integer
          nullable: true
        remarks:
          type: string
          nullable: true
        status:
          type: string
        room:
          type: string
          nullable: true
        rack:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true
        pairs:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              cage_id:
                type: string
              cross:
                type: string
              male_id:
                type: string
              female_id:
                type: string
        litters:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              cage_id:
                type: string
              dom:
                type: string
              litter_dob:
                type: string
              pups_alive:
                type: integer
              pups_dead:
                type: integer
              pups_male:
                type: integer
              pups_female:
                type: integer
              remarks:
                type: string
        recent_maintenance_notes:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceNote"
    MaintenanceNote:
      type: object
      description: "A maintenance / husbandry note attached to a cage."
      properties:
        id:
          type: integer
          example: 42
        cage_id:
          type: string
          example: "HC-12"
        user_id:
          type: integer
        note_text:
          type: string
        note_type:
          type: string
          nullable: true
          example: "husbandry"
        created_at:
          type: string
        updated_at:
          type: string
          nullable: true
        deleted_at:
          type: string
          nullable: true
    ActivityLogEntry:
      type: object
      description: "A row from the audit log."
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        action:
          type: string
          example: "api_request"
        entity_type:
          type: string
          example: "mouse"
        entity_id:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        ip_address:
          type: string
          nullable: true
        created_at:
          type: string
    User:
      type: object
      description: "Authenticated MyVivarium user (basic profile)."
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          example: "admin"
        position:
          type: string
          nullable: true
    PendingOperation:
      type: object
      description: "Returned by destructive endpoints in the confirm-before-execute flow when X-Confirm-Token is pending."
      properties:
        pending_operation_id:
          type: string
          example: "0c2f9c10-aaaa-bbbb-cccc-1234567890ab"
        diff:
          type: object
          description: "Before/after preview of the change."
          properties:
            before:
              type: object
            after:
              type: object
            summary:
              type: string
        expires_at:
          type: string
          example: "2026-05-13T12:34:56+00:00"
    ErrorEnvelope:
      type: object
      description: "Standard error response shape."
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "not_found"
            message:
              type: string
              example: "Mouse M999 not found"
    SuccessEnvelope:
      type: object
      description: "Standard success response shape; data is the operation-specific payload."
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
        meta:
          type: object
          description: "Present on list endpoints; contains count, total, limit, offset."
    Task:
      type: object
      description: "One-off task with assignees, status, and optional cage association."
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        assigned_by:
          type: integer
          nullable: true
        assigned_to:
          type: string
          description: "Comma-separated list of user IDs."
        status:
          type: string
          enum: ["Pending", "In Progress", "Completed"]
        completion_date:
          type: string
          nullable: true
        cage_id:
          type: string
          nullable: true
        creation_date:
          type: string
        updated_at:
          type: string
    Reminder:
      type: object
      description: "Recurring reminder that creates tasks per its schedule."
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        assigned_by:
          type: integer
        assigned_to:
          type: string
        recurrence_type:
          type: string
          enum: ["daily", "weekly", "monthly"]
        day_of_week:
          type: string
          nullable: true
        day_of_month:
          type: integer
          nullable: true
        time_of_day:
          type: string
        status:
          type: string
          enum: ["active", "inactive"]
        cage_id:
          type: string
          nullable: true
        creation_date:
          type: string
        updated_at:
          type: string
        last_task_created:
          type: string
          nullable: true
        next_due:
          type: string
          nullable: true
          description: "ISO datetime of the next scheduled firing (estimate)."
    CalendarEvent:
      type: object
      description: "A unified calendar event drawn from tasks or reminders."
      properties:
        source_type:
          type: string
          enum: ["task", "reminder"]
        source_id:
          type: integer
        title:
          type: string
        when:
          type: string
          description: "ISO date or datetime."
        status:
          type: string
        cage_id:
          type: string
          nullable: true
    Notification:
      type: object
      description: "In-app notification belonging to a single user."
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        message:
          type: string
          nullable: true
        link:
          type: string
          nullable: true
        type:
          type: string
          enum: ["reminder", "task", "system"]
        is_read:
          type: boolean
        created_at:
          type: string
    Strain:
      type: object
      description: "Mouse strain dictionary entry."
      properties:
        id:
          type: integer
        str_id:
          type: string
          example: "035561"
        name:
          type: string
        aka:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        rrid:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    IacucProtocol:
      type: object
      description: "An IACUC (Institutional Animal Care and Use Committee) protocol."
      properties:
        iacuc_id:
          type: string
        iacuc_title:
          type: string
        file_url:
          type: string
          nullable: true
    DashboardSummary:
      type: object
      description: "Permission-filtered counts for the authenticated user."
      properties:
        mouse_count:
          type: integer
        holding_cage_count:
          type: integer
        breeding_cage_count:
          type: integer
        my_open_tasks:
          type: integer
        my_unread_notifications:
          type: integer
        recent_activity_count_7d:
          type: integer
        upcoming_reminders_7d:
          type: integer
    MouseCageHistoryRow:
      type: object
      description: "One interval in a mouse's cage-move history."
      properties:
        id:
          type: integer
        mouse_id:
          type: string
        cage_id:
          type: string
          nullable: true
        moved_in_at:
          type: string
        moved_out_at:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        moved_by:
          type: integer
          nullable: true
    CageUser:
      type: object
      description: "A user assigned to a cage via cage_users."
      properties:
        user_id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        position:
          type: string
          nullable: true
    BreedingCageLineage:
      type: object
      description: "Sire, dam, parent cages, litters, and offspring of a breeding cage."
      properties:
        cage_id:
          type: string
        cross:
          type: string
          nullable: true
        sire:
          type: object
          nullable: true
        dam:
          type: object
          nullable: true
        parent_cages:
          type: object
          properties:
            sire_origin_cage:
              type: string
              nullable: true
            dam_origin_cage:
              type: string
              nullable: true
        litters:
          type: array
          items:
            type: object
        offspring:
          type: array
          items:
            type: object
    CageCardData:
      type: object
      description: "Structured payload powering the printable cage card view."
      properties:
        cage_id:
          type: string
        pi:
          type: object
          nullable: true
        iacuc:
          type: array
          items:
            $ref: "#/components/schemas/IacucProtocol"
        assigned_users:
          type: array
          items:
            $ref: "#/components/schemas/CageUser"
        occupants:
          type: array
          items:
            type: object
        pairs:
          type: array
          items:
            type: object
        latest_litter:
          type: object
          nullable: true
    SelfProfile:
      type: object
      description: "The current user's editable profile (whitelisted columns only)."
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        position:
          type: string
          nullable: true
        role:
          type: string
        status:
          type: string
        email_verified:
          type: boolean
        initials:
          type: string
          nullable: true
security:
  - ApiKeyAuth: []
tags:
  - name: "Health"
    description: "Liveness probe; no auth required."
  - name: "Users"
    description: "Identity endpoints."
  - name: "Mice"
    description: "Read and modify individual mice."
  - name: "Holding Cages"
    description: "Read and modify holding (non-breeding) cages."
  - name: "Breeding Cages"
    description: "Read and modify breeding cages."
  - name: "Maintenance Notes"
    description: "Husbandry notes attached to cages."
  - name: "Activity Log"
    description: "Audit trail of read and write operations."
  - name: "Admin"
    description: "Admin-only endpoints (none yet documented; reserved)."
  - name: "Tasks"
    description: "User tasks (one-off to-dos with assignees and statuses)."
  - name: "Reminders"
    description: "Recurring reminders that schedule task creation."
  - name: "Calendar"
    description: "Unified feed of upcoming tasks and reminders."
  - name: "Notifications"
    description: "Per-user in-app notifications."
  - name: "Strains"
    description: "Mouse strain dictionary."
  - name: "IACUC"
    description: "Institutional protocols referenced by cages."
  - name: "Dashboard"
    description: "High-level summary counts for the home screen."
  - name: "Account"
    description: "Self-service profile endpoints for the authenticated user."
paths:
  /health:
    get:
      summary: "Liveness probe"
      description: "Returns the API version and current server time. Use this once at the start of a session to verify /api/v1 is reachable and serving JSON. No auth, no rate limit, no database access."
      operationId: getHealth
      tags: ["Health"]
      security: []
      x-mv-read: true
      responses:
        "200":
          description: "API is up."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      version:
                        type: string
                      time:
                        type: string
        "500":
          description: "Server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me:
    get:
      summary: "Get the authenticated user"
      description: "Returns the user that owns the API key making the request. Use this to confirm identity, look up the caller's role, or display a personalized greeting."
      operationId: getMe
      tags: ["Users"]
      x-mv-read: true
      responses:
        "200":
          description: "The signed-in user."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: "User row not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mice:
    get:
      summary: "List mice"
      description: "Returns a paginated list of mice with optional filters by status, sex, strain, or current cage. Soft-deleted (archived) mice are excluded by default; admins may opt in with include_deleted=true."
      operationId: listMice
      tags: ["Mice"]
      x-mv-read: true
      parameters:
        - name: status
          in: query
          required: false
          description: "Filter by lifecycle status."
          schema:
            type: string
            enum: ["alive", "sacrificed", "transferred_out", "archived"]
        - name: sex
          in: query
          required: false
          description: "Filter by sex."
          schema:
            type: string
            enum: ["male", "female", "unknown"]
        - name: strain
          in: query
          required: false
          description: "Filter by strain string (exact match)."
          schema:
            type: string
            example: "C57BL/6J"
        - name: cage_id
          in: query
          required: false
          description: "Filter by current cage_id."
          schema:
            type: string
            example: "HC-12"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/IncludeDeletedParam"
      responses:
        "200":
          description: "List of mice."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Mouse"
                  meta:
                    type: object
        "400":
          description: "Bad query parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: "Rate limit hit."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      summary: "Create a mouse"
      description: "Register a new mouse. Requires write scope. The caller must have write access to the target cage (or be an admin to create a cageless mouse). This is a safe write."
      operationId: createMouse
      tags: ["Mice"]
      x-mv-safe-write: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["mouse_id"]
              properties:
                mouse_id:
                  type: string
                  description: "Unique mouse identifier (your colony's convention)."
                  example: "M042"
                cage_id:
                  type: string
                  description: "Cage to place the mouse in. Omit only as admin."
                  example: "HC-12"
                sex:
                  type: string
                  enum: ["male", "female", "unknown"]
                dob:
                  type: string
                  example: "2025-08-01"
                strain:
                  type: string
                  example: "C57BL/6J"
                genotype:
                  type: string
                ear_code:
                  type: string
                notes:
                  type: string
      responses:
        "201":
          description: "Created mouse (full row)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Mouse"
        "400":
          description: "Validation failure."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: "Lacks write scope or cage permission."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: "Mouse already exists."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: "Rate limit hit."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mice/{id}:
    get:
      summary: "Get one mouse"
      description: "Returns full details for a single mouse including current cage and parentage. Soft-deleted mice are hidden by default; admins can opt in with include_deleted=true."
      operationId: getMouse
      tags: ["Mice"]
      x-mv-read: true
      parameters:
        - name: id
          in: path
          required: true
          description: "Mouse identifier."
          schema:
            type: string
          example: "M042"
        - $ref: "#/components/parameters/IncludeDeletedParam"
      responses:
        "200":
          description: "Mouse detail."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Mouse"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: "Mouse not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      summary: "Update a mouse"
      description: "Update editable fields on a mouse (sex, dob, strain, genotype, ear_code, parentage, notes). Destructive: supports the X-Confirm-Token confirm flow so the caller can preview a diff before committing."
      operationId: updateMouse
      tags: ["Mice"]
      x-mv-destructive: true
      parameters:
        - name: id
          in: path
          required: true
          description: "Mouse identifier."
          schema:
            type: string
          example: "M042"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "Provide only the fields to change."
              properties:
                sex:
                  type: string
                  enum: ["male", "female", "unknown"]
                dob:
                  type: string
                strain:
                  type: string
                genotype:
                  type: string
                ear_code:
                  type: string
                sire_id:
                  type: string
                dam_id:
                  type: string
                sire_external_ref:
                  type: string
                dam_external_ref:
                  type: string
                source_cage_label:
                  type: string
                notes:
                  type: string
      responses:
        "200":
          description: "Updated mouse."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Mouse"
        "202":
          description: "Pending operation; awaiting confirmation."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/PendingOperation"
        "400":
          description: "Bad request."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: "Lacks write permission for this mouse."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: "Mouse not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "410":
          description: "Pending operation token has expired."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      summary: "Soft-delete a mouse"
      description: "Archive (soft-delete) a mouse by setting status=archived and clearing its current cage. Hard delete is not exposed here. Destructive: supports the confirm flow."
      operationId: archiveMouse
      tags: ["Mice"]
      x-mv-destructive: true
      parameters:
        - name: id
          in: path
          required: true
          description: "Mouse identifier."
          schema:
            type: string
          example: "M042"
      responses:
        "200":
          description: "Archived mouse (full row)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Mouse"
        "202":
          description: "Pending operation; awaiting confirmation."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
