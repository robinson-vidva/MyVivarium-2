                    type: object
        "400":
          description: "Bad query parameter."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: "Missing or invalid API key."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      summary: "Add a maintenance note"
      description: "Attach a maintenance note to a cage. Safe write. Caller needs write access to the cage. Body: cage_id, note_text (both required), and optional type (e.g. water, bedding, husbandry)."
      operationId: addMaintenanceNote
