  /maintenance-notes:
    get:
      summary: "List maintenance notes"
      description: "Returns husbandry / maintenance notes attached to cages, optionally filtered by cage_id and a date range. Soft-deleted notes are hidden by default."
      operationId: listMaintenanceNotes
      tags: ["Maintenance Notes"]
